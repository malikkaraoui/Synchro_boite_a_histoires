name: Build LuniiSync

on:
  push:
    tags:
      - "v*"          # Déclenché par : git tag v1.0 && git push --tags
  workflow_dispatch:  # Bouton manuel sur GitHub

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dépendances système
        run: brew install ffmpeg

      - name: Dépendances Python
        run: |
          pip install --quiet --upgrade \
            pyinstaller PySide6-Essentials psutil xxtea requests \
            pycryptodome Pillow mutagen ffmpeg-python unidecode py7zr

      - name: Lunii.QT
        run: git clone --quiet https://github.com/o-daneel/Lunii.QT.git

      - name: studio-pack-generator (aarch64)
        run: |
          curl -fsSL \
            "https://github.com/jersou/studio-pack-generator/releases/download/v0.5.14/studio-pack-generator-0.5.14-aarch64-apple.zip" \
            -o spg.zip
          unzip -q spg.zip
          mv studio-pack-generator-aarch64-apple studio-pack-generator
          chmod +x studio-pack-generator

      - name: Build .app
        run: pyinstaller lunii-app.spec --noconfirm

      - name: Importer le certificat Developer ID
        run: |
          echo "$APPLE_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "ci-keychain" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci-keychain" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" build.keychain
          rm cert.p12
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}

      - name: Signer le .app
        run: |
          codesign --deep --force --options runtime \
            --sign "Developer ID Application: Malik Karaoui (UPES5479T5)" \
            --entitlements lunii-app.entitlements \
            dist/LuniiSync.app

      - name: Créer le DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "LuniiSync" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "LuniiSync.app" 150 185 \
            --hide-extension "LuniiSync.app" \
            --app-drop-link 450 185 \
            "dist/LuniiSync-macOS.dmg" \
            "dist/LuniiSync.app"

      - name: Notariser le DMG
        run: |
          xcrun notarytool submit dist/LuniiSync-macOS.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/LuniiSync-macOS.dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: LuniiSync-macOS
          path: dist/LuniiSync-macOS.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: FFmpeg
        run: choco install ffmpeg -y --no-progress

      - name: Dépendances Python
        run: |
          pip install --quiet --upgrade `
            pyinstaller PySide6-Essentials psutil xxtea requests `
            pycryptodome Pillow mutagen ffmpeg-python unidecode py7zr

      - name: Lunii.QT
        run: git clone --quiet https://github.com/o-daneel/Lunii.QT.git

      - name: studio-pack-generator (Windows)
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/jersou/studio-pack-generator/releases/download/v0.5.14/studio-pack-generator-0.5.14-x86_64-windows.zip" `
            -OutFile "spg.zip"
          Expand-Archive -Path spg.zip -DestinationPath spg-extracted -Force
          Move-Item "spg-extracted\Studio-Pack-Generator\studio-pack-generator-x86_64-windows.exe" "studio-pack-generator.exe"
          Move-Item "spg-extracted\Studio-Pack-Generator\tools" "tools"

      - name: Générer icône .ico
        run: |
          python -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGBA',(256,256),(20,50,120,255))
          d = ImageDraw.Draw(img)
          d.ellipse([20,20,236,236],fill=(40,100,200,255))
          d.text((128,128),'L',fill=(255,255,255,255),anchor='mm')
          s=[16,32,48,64,128,256]
          imgs=[img.resize((x,x),Image.LANCZOS) for x in s]
          imgs[0].save('lunii-sync.ico',format='ICO',sizes=[(x,x) for x in s],append_images=imgs[1:])
          "

      - name: Patch spec pour Windows (.ico)
        shell: pwsh
        run: |
          (Get-Content lunii-app.spec -Raw) `
            -replace "icon=str\(LUNII_QT.*?else None", "icon='lunii-sync.ico'" |
          Set-Content lunii-app-win.spec -Encoding UTF8

      - name: Build .exe
        run: pyinstaller lunii-app-win.spec --noconfirm

      - name: ZIP le dossier
        run: Compress-Archive -Path dist\LuniiSync -DestinationPath dist\LuniiSync-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: LuniiSync-Windows
          path: dist\LuniiSync-Windows.zip

  # ── Release GitHub ─────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Créer la release
        uses: softprops/action-gh-release@v2
        with:
          name: "LuniiSync"
          body: |
            ## LuniiSync

            ### Téléchargements

            - **Windows** : `LuniiSync-Windows.zip` → extraire le dossier → double-cliquer `LuniiSync.exe`
            - **macOS** : `LuniiSync-macOS.dmg` → ouvrir → glisser dans Applications → lancer
          files: |
            artifacts/LuniiSync-Windows/LuniiSync-Windows.zip
            artifacts/LuniiSync-macOS/LuniiSync-macOS.dmg
